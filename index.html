<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alkholoud Building Maintenance</title>

    <link rel="shortcut icon" href="./images/webp/logo-webp.webp" type="image/x-icon">

    <link rel="stylesheet" href="./css/index.css" />
</head>

<body>

    <header>
        <div class="images">
            <img class="header-slide active" src="./images/webp/blumbing.webp" alt="blumping">
            <img class="header-slide" src="./images/webp/ceramic.webp" alt="ceramics">
            <img class="header-slide" src="./images/webp/floor.webp" alt="floor cracks">
            <img class="header-slide" src="./images/webp/interior.webp" alt="interior">
            <img class="header-slide" src="./images/webp/interlock.webp" alt="interlock">
            <img class="header-slide" src="./images/webp/paint.webp" alt="paints">
            <img class="header-slide" src="./images/webp/pruning.webp" alt="prunings">
        </div>

        <nav>
            <div class="logo">
                <img src="./images/webp/logo-webp.webp" alt="alkholoudbm-logo">
            </div>

            <div class="menu">
                <a href="/" class="menu-link">Home</a>
                <a href="/" class="menu-link">About</a>
                <a href="/" class="menu-link">Services</a>
                <a href="/" class="menu-link">Contact</a>
                <a href="/" class="menu-link">العربية</a>
            </div>

            <div class="burger">
                <span></span>
                <span></span>
            </div>
        </nav>
    </header>

    <div class="container">
        <section id="about">
            <h2 class="observe split-text">
                From intricate interior decorations and gypsum artistry to essential structural repairs and
                plumbing, Alkholoud Building Maintenance provides a seamless, one-stop solution
                for all your property needs.

            </h2>
        </section>
    </div>



    <script src="./js/app.js"></script>
    <script src="./js/observer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/SplitText.min.js"></script>

    <script>
        // LOADING GSAP LIBRARIES
        document.addEventListener("DOMContentLoaded", (event) => {
            gsap.registerPlugin(ScrollTrigger, SplitText)
        });
    </script>

    <script src="./js/splitText.js"></script>
</body>

</html>
